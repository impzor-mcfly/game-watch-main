<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <title>Face Dodge Vertical</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>

<body>

  <div class="game-container">

    <div class="hud">

      <div class="hud-left">
        <span id="timer">30</span>
      </div>

      <div class="hud-center">
        <img src="./assets/logo.png" class="hud-img">
      </div>

      <div class="hud-right">
        <span id="score">0</span>
      </div>

    </div>

    <img src="./assets/background-game.png" class="bg">


    <video id="video" autoplay playsinline></video>

    <canvas id="game"></canvas>

  </div>

  <!---------- START ---------->
  <div id="startModal" class="modal" style="display:flex;">
    <div class="modalContent">
      <h2>Face Dodge</h2>
      <button id="startBtn">Start</button>
    </div>
  </div>

  <!--------- GAME OVER ---------->
  <div id="gameOverModal" class="modal">

    <div class="gameover-container">

      <!-- LOGO -->
      <img src="./assets/logo.png" class="logo">

      <!-- CARD -->
      <div class="card">

        <h2 class="score-text"><span id="finalScore">0</span>!</h2>

        <!-- ESTRELLAS -->
        <div class="stars">
          <img src="./assets/star.png">
          <img src="./assets/star.png">
          <img src="./assets/star.png">
        </div>

        <h1 class="winner">WINNER!</h1>

        <!-- BOTELLAS -->
        <img class="bottles" src="./assets/botellas.png">


        <button id="restartBtn">Play Again</button>

      </div>

    </div>

  </div>

  <script src="game.js"></script>

</body>

</html>
